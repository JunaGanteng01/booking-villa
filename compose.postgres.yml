services:
  postgres:
    image: postgres:16-alpine
    container_name: villaku-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: villaku
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - villaku_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d villaku"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  villaku_postgres_data:
